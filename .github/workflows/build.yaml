name: build

# ------------- NOTE
# please setup some secrets before running this workflow:
# SUBMODULES_TOKEN is a GitHub PAT with read access to the private bgdesk-config repository

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-[0-9]+'

env:
  CARGO_TERM_COLOR: always
  # sqlx compile-time macros use committed sqlx-data.json (no DB at build time)
  SQLX_OFFLINE: true

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:

  prepare-release:
    name: Prepare release tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build - ${{ matrix.job.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: "amd64",   target: "x86_64-unknown-linux-musl" }
          - { name: "arm64v8", target: "aarch64-unknown-linux-musl" }
          - { name: "armv7",   target: "armv7-unknown-linux-musleabihf" }

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"
          targets: ${{ matrix.job.target }}
          components: rustfmt

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --all-features --target=${{ matrix.job.target }}

      - name: Exec chmod
        run: chmod -v a+x target/${{ matrix.job.target }}/release/*

      - name: Publish Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-linux-${{ matrix.job.name }}
          path: |
            target/${{ matrix.job.target }}/release/hbbr
            target/${{ matrix.job.target }}/release/hbbs
            target/${{ matrix.job.target }}/release/bgdesk-utils
          if-no-files-found: error

  release:
    name: Github release
    needs:
      - build
      - prepare-release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binaries-linux-*
          path: artifacts
          merge-multiple: false

      - name: Pack release archives
        run: |
          mkdir -p dist
          for arch in amd64 arm64v8 armv7; do
            chmod -v a+x "artifacts/binaries-linux-${arch}"/*
            zip -j "dist/bgdesk-server-linux-${arch}.zip" "artifacts/binaries-linux-${arch}"/*
          done
          ls -la dist/

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          draft: false
          fail_on_unmatched_files: true
          files: |
            dist/bgdesk-server-linux-amd64.zip
            dist/bgdesk-server-linux-arm64v8.zip
            dist/bgdesk-server-linux-armv7.zip
